[package]
name = "cargo-assets"
version = "0.1.0"
edition = "2024"

[dependencies]
reqwest = "0.13"
anyhow = "1"
serde_json = "1"

[dependencies.camino]
version = "1"
features = ["serde1"]

[dependencies.serde]
version = "1"
features = ["derive"]

[dependencies.tokio]
version = "1"
features = ["full"]

[lints.clippy]
all = "deny"
